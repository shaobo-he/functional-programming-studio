name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Based on actions/starter-workflows ci/haskell.yml (haskell-actions/setup is
  # the maintained successor to the starter's actions/setup-haskell@v1).
  haskell:
    name: Haskell CI (santorini)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: santorini
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          cabal-version: '3.10.3.0'

      - name: Cache
        uses: actions/cache@v4
        env:
          cache-name: cache-cabal
        with:
          path: ~/.cabal
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          cabal update
          cabal build --only-dependencies --enable-tests --enable-benchmarks

      - name: Build
        run: cabal build --enable-tests --enable-benchmarks all

      - name: Run tests
        run: cabal test all --test-show-details=direct

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: AlphaZero rules and search tests
        run: |
          python -m pip install numpy
          PYTHONPATH=alphazero/src python -m unittest discover -s alphazero/tests -v

      - name: Referee smoke (modern vs legacy, 1 game)
        run: |
          REF=$(cabal list-bin referee)
          MP=$(cabal list-bin modern-player)
          LP=$(cabal list-bin legacy-player)
          timeout 120 "$REF" "$MP" "$LP" 1 300

  sudoku:
    name: Sudoku — Lean proofs + Racket diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          version: 'stable'
          variant: 'CS'

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean build
        uses: actions/cache@v4
        with:
          path: sudoku/lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('sudoku/lean/lean-toolchain', 'sudoku/lean/lake-manifest.json') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Build Lean (type-checks the proofs)
        working-directory: sudoku/lean
        run: lake build

      - name: Racket unit tests
        working-directory: sudoku
        run: raco test tests/*.rkt

      - name: Lean vs Racket diff test
        run: bash sudoku/scripts/diff-sudoku.sh
